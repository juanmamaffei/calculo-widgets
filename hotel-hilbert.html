<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hotel de Hilbert</title>
<style>
:root{--curso:#005b7f;--verde:#16BC59;--tinta:#0b1f2a;}*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:var(--tinta);color:#eaf6ff;padding:18px}
.wrap{max-width:680px;margin:0 auto}.pill{display:inline-block;background:rgba(22,188,89,.15);color:var(--verde);padding:.15em .6em;border-radius:999px;font-size:.8rem;font-weight:600}
h1{font-size:1.25rem;margin:.4em 0 .2em}.sub{color:#9fc4d6;font-size:.9rem;margin:0 0 14px}
.rooms{display:flex;gap:6px;overflow-x:auto;padding:10px 0}
.room{flex:0 0 auto;width:58px;height:64px;border-radius:10px;background:#13303f;border:1px solid #26506a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.7rem;color:#9fc4d6;transition:.3s}
.room .g{font-size:1.4rem;transition:.3s}.room.free{background:rgba(22,188,89,.18);border-color:var(--verde)}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.btn{background:var(--verde);color:#04231a;border:0;border-radius:8px;padding:9px 14px;font-weight:700;cursor:pointer}
.btn.alt{background:#13303f;color:#eaf6ff;border:1px solid #26506a}
.msg{background:#13303f;border-left:4px solid var(--verde);padding:10px 14px;border-radius:8px;margin-top:8px;min-height:1.5em}
</style></head><body><div class="wrap">
<span class="pill">interactivo</span><h1>🏨 El Hotel de Hilbert</h1>
<p class="sub">Infinitas habitaciones, todas ocupadas. ¿Igual hay lugar? Probá.</p>
<div class="rooms" id="rooms"></div>
<div class="btns">
<button class="btn" id="b1">Llega 1 huésped</button>
<button class="btn" id="b2">Llega un colectivo infinito</button>
<button class="btn alt" id="reset">Reiniciar</button>
</div>
<div class="msg" id="msg">Cada habitación n tiene un huésped. Parece imposible meter a alguien más…</div>
</div><script>
const N=8,roomsEl=document.getElementById('rooms'),msg=document.getElementById('msg');
let guests=[];
function reset(){guests=Array.from({length:N},(_,i)=>i+1);render();msg.textContent='Cada habitación n tiene un huésped. Parece imposible meter a alguien más…';}
function render(free){roomsEl.innerHTML='';for(let i=1;i<=N;i++){const d=document.createElement('div');d.className='room'+((free&&free.includes(i))?' free':'');const g=guests[i-1];d.innerHTML='<div class="g">'+(g?'🧍':'')+'</div><div>hab '+i+(g?'·h'+g:' libre')+'</div>';roomsEl.appendChild(d);}const d=document.createElement('div');d.className='room';d.innerHTML='<div class="g">…</div><div>∞</div>';roomsEl.appendChild(d);}
document.getElementById('b1').onclick=()=>{for(let i=N;i>=1;i--)guests[i]=guests[i-1];guests[0]=null;render([1]);msg.innerHTML='Cada huésped pasa de la pieza n a la <b>n+1</b>. La <b>habitación 1 queda libre</b>. ¡Entró 1 más en un hotel lleno!';};
document.getElementById('b2').onclick=()=>{const g=guests.slice();for(let i=0;i<N;i++)guests[i]=null;for(let i=0;i<N;i++){const dest=2*(i+1);if(dest<=N)guests[dest-1]=g[i];}render([1,3,5,7]);msg.innerHTML='Cada huésped n va a la pieza <b>2n</b> (las pares). Quedan libres <b>todas las impares</b>: ¡infinitos lugares nuevos!';};
document.getElementById('reset').onclick=reset;reset();
</script></body></html>
