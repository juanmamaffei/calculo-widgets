<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>La homográfica</title>
<style>
:root{--curso:#005b7f;--verde:#16BC59;--tinta:#0b1f2a;--rojo:#e06b6b;--amar:#ffd166;}*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:var(--tinta);color:#eaf6ff;padding:18px}
.wrap{max-width:680px;margin:0 auto}
.pill{display:inline-block;background:rgba(22,188,89,.15);color:var(--verde);padding:.15em .6em;border-radius:999px;font-size:.8rem;font-weight:600}
h1{font-size:1.25rem;margin:.4em 0 .2em}.sub{color:#9fc4d6;font-size:.9rem;margin:0 0 14px}
.eq{font-family:ui-monospace,monospace;font-size:1.15rem;text-align:center;color:var(--verde);margin:6px 0}
canvas{width:100%;height:auto;background:#0e2733;border-radius:10px;display:block;margin:8px 0;touch-action:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin:6px 0}
label{font-size:.85rem;color:#9fc4d6}input[type=range]{width:100%;accent-color:var(--verde)}
.dom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0}
.chip{background:#13303f;border-radius:8px;padding:8px 6px;text-align:center;font-size:.78rem;color:#9fc4d6;line-height:1.3}
.chip b{display:block;font-size:1.02rem;margin-top:2px}
.chip.v b{color:var(--rojo)}.chip.h b{color:var(--amar)}.chip.z b{color:var(--verde)}
.msg{background:#13303f;border-left:4px solid var(--verde);padding:10px 14px;border-radius:8px;margin-top:10px;font-size:.92rem;line-height:1.45}
b{color:var(--verde)}.r{color:var(--rojo)}.am{color:var(--amar)}
@media(max-width:430px){.dom{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<span class="pill">interactivo</span><h1>📐 La homográfica</h1>
<p class="sub">f(x) = (a·x + b)/(c·x + d). Moviendo los cuatro coeficientes, la hipérbola y sus asíntotas se reacomodan: la <span class="r">vertical x = −d/c</span> (donde se anula el denominador) y la <span class="am">horizontal y = a/c</span> (el techo a lo lejos).</p>
<div class="eq" id="eq"></div>
<canvas id="c" width="660" height="380"></canvas>
<div class="grid">
<label>a (numerador, ·x): <b id="va">2</b><input type="range" id="a" min="-4" max="4" value="2" step="0.5"></label>
<label>b (numerador): <b id="vb">1</b><input type="range" id="b" min="-5" max="5" value="1" step="0.5"></label>
<label>c (denominador, ·x): <b id="vc">1</b><input type="range" id="c2" min="-4" max="4" value="1" step="0.5"></label>
<label>d (denominador): <b id="vd">-1</b><input type="range" id="d" min="-5" max="5" value="-1" step="0.5"></label>
</div>
<div class="dom">
<div class="chip v">asíntota vertical<b id="cv"></b></div>
<div class="chip h">asíntota horizontal<b id="ch"></b></div>
<div class="chip z">cero de f<b id="cz"></b></div>
</div>
<div class="msg" id="msg"></div>
</div><script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const A=document.getElementById('a'),B=document.getElementById('b'),C=document.getElementById('c2'),D=document.getElementById('d');
const lo=-10,hi=10;
const sx=u=>34+(u-lo)/(hi-lo)*(W-48), sy=u=>H-26-(u-lo)/(hi-lo)*(H-44);
function fmt(n){return (Math.round(n*100)/100).toString();}
// fraccion a/b reducida como texto, para mostrar -d/c y a/c "bonito"
function frac(num,den){
  if(den===0) return '—';
  let v=num/den;
  return fmt(v);
}
function grid(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#1d3d4d';ctx.lineWidth=1;
  for(let u=lo;u<=hi;u++){ctx.beginPath();ctx.moveTo(sx(u),12);ctx.lineTo(sx(u),H-14);ctx.stroke();ctx.beginPath();ctx.moveTo(20,sy(u));ctx.lineTo(W-14,sy(u));ctx.stroke();}
  ctx.strokeStyle='#5a8aa6';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(20,sy(0));ctx.lineTo(W-14,sy(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx(0),12);ctx.lineTo(sx(0),H-14);ctx.stroke();
}
function draw(){
  const a=+A.value,b=+B.value,cc=+C.value,d=+D.value;
  document.getElementById('va').textContent=fmt(a);
  document.getElementById('vb').textContent=fmt(b);
  document.getElementById('vc').textContent=fmt(cc);
  document.getElementById('vd').textContent=fmt(d);
  const den=x=>cc*x+d, f=x=>(a*x+b)/den(x);
  // ecuacion
  const numTxt=fmt(a)+'·x '+(b<0?'− '+fmt(-b):'+ '+fmt(b));
  const denTxt=fmt(cc)+'·x '+(d<0?'− '+fmt(-d):'+ '+fmt(d));
  document.getElementById('eq').textContent='f(x) = ('+numTxt+') / ('+denTxt+')';
  grid();

  const degener = (cc===0); // denominador constante: ya no es homográfica genuina
  const xv = cc!==0 ? -d/cc : null;        // asíntota vertical
  const yh = cc!==0 ? a/cc : null;         // asíntota horizontal
  const zero = a!==0 ? -b/a : null;        // cero de f (numerador 0)
  // verificamos que el cero no coincida con el punto prohibido
  const zeroValido = zero!==null && !(cc!==0 && Math.abs(zero-xv)<1e-9);

  // chips
  document.getElementById('cv').textContent = xv!==null ? 'x = '+fmt(xv) : 'no hay (c=0)';
  document.getElementById('ch').textContent = yh!==null ? 'y = '+fmt(yh) : 'no hay (c=0)';
  document.getElementById('cz').textContent = a===0 ? (b===0?'todo es 0':'no tiene') : (zeroValido?'x = '+fmt(zero):'se cancela');

  // asíntotas dibujadas
  if(xv!==null){
    ctx.strokeStyle='#e06b6b';ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(sx(xv),12);ctx.lineTo(sx(xv),H-14);ctx.stroke();
  }
  if(yh!==null){
    ctx.strokeStyle='#ffd166';ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(20,sy(yh));ctx.lineTo(W-14,sy(yh));ctx.stroke();
  }
  ctx.setLineDash([]);

  // curva: dos ramas separadas por la asíntota vertical
  ctx.strokeStyle='#16BC59';ctx.lineWidth=3;
  const sides = xv!==null ? [-1,1] : [0];
  for(const side of sides){
    ctx.beginPath();let started=false;
    for(let px=0;px<=W;px++){
      const u=lo+(px-34)/(W-48)*(hi-lo);
      if(xv!==null){
        if(side<0 && u>=xv-0.002) continue;
        if(side>0 && u<=xv+0.002) continue;
      }
      if(Math.abs(den(u))<1e-9){started=false;continue;}
      const y=f(u);
      if(y<lo-2||y>hi+2){started=false;continue;}
      const X0=sx(u),Y0=sy(y);
      if(!started){ctx.moveTo(X0,Y0);started=true;}else ctx.lineTo(X0,Y0);
    }
    ctx.stroke();
  }

  // etiquetas asíntotas
  ctx.font='11px system-ui';
  if(yh!==null){ctx.fillStyle='#ffd166';ctx.fillText('y = a/c = '+fmt(yh),W-150,sy(yh)-6);}
  if(xv!==null){ctx.fillStyle='#e06b6b';
    const t='x = −d/c = '+fmt(xv);
    if(sx(xv)<W-120)ctx.fillText(t,sx(xv)+4,18);else ctx.fillText(t,sx(xv)-92,18);
  }
  // marca del punto prohibido sobre el eje x (hueco rojo)
  if(xv!==null && sx(xv)>20 && sx(xv)<W-14){
    ctx.fillStyle='#0e2733';ctx.beginPath();ctx.arc(sx(xv),sy(0),5,0,7);ctx.fill();
    ctx.strokeStyle='#e06b6b';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx(xv),sy(0),5,0,7);ctx.stroke();
  }
  // marca del cero (verde lleno sobre el eje x)
  if(zeroValido && zero>=lo && zero<=hi){
    ctx.fillStyle='#16BC59';ctx.beginPath();ctx.arc(sx(zero),sy(0),5,0,7);ctx.fill();
    ctx.strokeStyle='#0b1f2a';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx(zero),sy(0),5,0,7);ctx.stroke();
  }

  // mensaje pedagógico
  let m;
  if(degener){
    m='Pusiste <b>c = 0</b>: el denominador es la constante '+fmt(d)+(d===0?' (¡y vale 0! la función no existe en ningún lado)':'')+'. Ya no es una homográfica: sin x en el denominador <b>no hay asíntota vertical</b> y la gráfica es una recta. Movelo a c ≠ 0 para recuperar la hipérbola.';
  }else if(Math.abs(a*d-b*cc)<1e-9){
    m='Caso especial: <b>a·d − b·c = 0</b>, así que el numerador es múltiplo del denominador y f(x) se simplifica a la constante <b>'+fmt(yh)+'</b> (salvo el agujero en x = '+fmt(xv)+'). La hipérbola degenera en una recta horizontal: por eso casi no se ve curva.';
  }else{
    m='El denominador c·x + d se anula en <span class="r">x = −d/c = '+fmt(xv)+'</span>: ese punto se <b>saca del dominio</b> y ahí la curva se dispara a ±∞ (asíntota vertical). A lo lejos, el +b y el +d pesan poco y f(x) → a/c, así que la <span class="am">horizontal es y = '+fmt(yh)+'</span>. '+
      (a===0
        ? 'Como a = 0, el numerador es constante: f no tiene cero (nunca cruza el eje x), por eso la horizontal es y = 0.'
        : (zeroValido
            ? 'La función vale <b>0</b> donde se anula el numerador: <span class="z">x = −b/a = '+fmt(zero)+'</span> (¡el cero del numerador, no el del denominador!).'
            : 'Acá el cero del numerador coincidiría con el del denominador: se cancela y no hay corte con el eje x.'));
  }
  document.getElementById('msg').innerHTML=m;
}
[A,B,C,D].forEach(s=>s.oninput=draw);draw();
</script></body></html>
