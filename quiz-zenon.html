<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz · La paradoja de Aquiles</title>
<style>
  :root{--curso:#005b7f;--verde:#16BC59;--tinta:#0b1f2a;--rojo:#e06b6b;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--tinta);color:#eaf6ff;padding:18px;}
  .wrap{max-width:680px;margin:0 auto;}
  .pill{display:inline-block;background:rgba(22,188,89,.15);color:var(--verde);padding:.15em .6em;border-radius:999px;font-size:.8rem;font-weight:600;}
  h1{font-size:1.25rem;margin:.4em 0 14px;}
  .q{background:#13303f;border-radius:12px;padding:16px;margin:0 0 14px;}
  .q p{margin:0 0 10px;font-weight:600;}
  .opt{display:block;width:100%;text-align:left;background:#0e2733;color:#eaf6ff;border:1px solid #26506a;border-radius:8px;padding:11px 14px;margin:6px 0;cursor:pointer;font-size:.95rem;transition:.15s;}
  .opt:hover{border-color:var(--verde);}
  .opt.ok{background:rgba(22,188,89,.2);border-color:var(--verde);}
  .opt.no{background:rgba(224,107,107,.18);border-color:var(--rojo);}
  .fb{font-size:.88rem;margin-top:8px;color:#bfe3ff;display:none;}
  .fb.show{display:block;}
  .score{background:linear-gradient(135deg,var(--curso),var(--verde));border-radius:12px;padding:16px;text-align:center;font-size:1.1rem;font-weight:700;display:none;}
  .score.show{display:block;}
  .btn{background:var(--verde);color:#04231a;border:0;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <span class="pill">autocorregido</span>
  <h1>¿Entendiste a Zenón?</h1>
  <div id="quiz"></div>
  <div class="score" id="score"></div>
  <button class="btn" id="reset" style="display:none">Reintentar</button>
</div>
<script>
  const QS=[
    {q:'Aquiles da infinitos pasos para alcanzar a la tortuga. ¿Cuánto tiempo le lleva?',
     opts:['Infinito: nunca la alcanza','Un tiempo finito: la alcanza','Depende de la velocidad de la tortuga'],
     ok:1, fb:'Infinitos pasos cuyos tiempos se achican pueden sumar un total finito. Por eso la alcanza.'},
    {q:'La suma ½ + ¼ + ⅛ + … (infinitos términos) da…',
     opts:['Infinito','Un número mayor que 1','Exactamente 1'],
     ok:2, fb:'Las sumas parciales se acercan a 1 tanto como se quiera, sin pasarlo: el límite es 1.'},
    {q:'¿Dónde estaba el error del razonamiento de Zenón?',
     opts:['En suponer que infinitos pasos = tiempo infinito','En la velocidad de Aquiles','No hay error: es correcto'],
     ok:0, fb:'Cada paso es lógicamente correcto, pero "infinitas etapas" no implica "duración infinita".'},
    {q:'La herramienta matemática que resuelve esto con rigor es…',
     opts:['La derivada','El límite','El teorema de Pitágoras'],
     ok:1, fb:'El concepto de límite (formalizado en el siglo XIX) define a qué número converge la suma.'},
  ];
  const quiz=document.getElementById('quiz'), scoreEl=document.getElementById('score'), resetBtn=document.getElementById('reset');
  let answered=0, correct=0;
  function render(){
    answered=0;correct=0;quiz.innerHTML='';scoreEl.className='score';resetBtn.style.display='none';
    QS.forEach((item,i)=>{
      const d=document.createElement('div');d.className='q';
      d.innerHTML='<p>'+(i+1)+'. '+item.q+'</p>';
      item.opts.forEach((o,j)=>{
        const b=document.createElement('button');b.className='opt';b.textContent=o;
        b.onclick=()=>{
          if(d.dataset.done)return; d.dataset.done='1';answered++;
          const btns=d.querySelectorAll('.opt');
          if(j===item.ok){b.classList.add('ok');correct++;}
          else{b.classList.add('no');btns[item.ok].classList.add('ok');}
          d.querySelector('.fb').classList.add('show');
          if(answered===QS.length)finish();
        };
        d.appendChild(b);
      });
      const fb=document.createElement('div');fb.className='fb';fb.textContent='💡 '+item.fb;d.appendChild(fb);
      quiz.appendChild(d);
    });
  }
  function finish(){
    scoreEl.textContent=correct+' / '+QS.length+(correct===QS.length?' 🎉 ¡Perfecto!':correct>=QS.length/2?' 👍 ¡Bien!':' — repasá la clase');
    scoreEl.classList.add('show');resetBtn.style.display='inline-block';
  }
  resetBtn.onclick=render;
  render();
</script>
</body>
</html>
