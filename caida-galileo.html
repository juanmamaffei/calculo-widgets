<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caída de Galileo</title>
<style>
:root{--curso:#005b7f;--verde:#16BC59;--tinta:#0b1f2a;}*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:var(--tinta);color:#eaf6ff;padding:18px}
.wrap{max-width:680px;margin:0 auto}.pill{display:inline-block;background:rgba(22,188,89,.15);color:var(--verde);padding:.15em .6em;border-radius:999px;font-size:.8rem;font-weight:600}
h1{font-size:1.25rem;margin:.4em 0 .2em}.sub{color:#9fc4d6;font-size:.9rem;margin:0 0 14px}
.flex{display:flex;gap:14px;flex-wrap:wrap}canvas{background:#0e2733;border-radius:10px;flex:1;min-width:260px}
label{font-size:.85rem;color:#9fc4d6}input[type=range]{width:100%;accent-color:var(--verde)}
table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:8px}td,th{border:1px solid #26506a;padding:5px 8px;text-align:center}th{color:#9fc4d6}
.btn{background:var(--verde);color:#04231a;border:0;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;margin-top:8px}
.msg{background:#13303f;border-left:4px solid var(--verde);padding:10px 14px;border-radius:8px;margin-top:10px}b{color:var(--verde)}
</style></head><body><div class="wrap">
<span class="pill">interactivo</span><h1>🗼 Galileo y la caída</h1>
<p class="sub">Una piedra cae desde la torre. ¿La distancia es proporcional al tiempo… o a su cuadrado? Mové el tiempo.</p>
<div class="flex">
<canvas id="c" width="180" height="300"></canvas>
<div style="flex:2;min-width:240px">
<label>tiempo t: <b id="vt">1.0</b> s<input type="range" id="t" min="0" max="3" step="0.1" value="1"></label>
<button class="btn" id="play">▶ soltar</button>
<table><tr><th>t (s)</th><th>d = 5·t² (m)</th></tr><tbody id="tb"></tbody></table>
</div></div>
<div class="msg" id="msg"></div>
</div><script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),T=document.getElementById('t');
const g=10,H=c.height,top=20,bottom=H-20,maxD=45;// d=½·10·t²=5t²; t máx 3 -> 45m
function dist(t){return 0.5*g*t*t;}
function draw(t){const d=dist(t);ctx.clearRect(0,0,c.width,H);
ctx.fillStyle='#26506a';ctx.fillRect(20,top,12,bottom-top);// torre
const y=top+(d/maxD)*(bottom-top);ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(60,y,9,0,7);ctx.fill();
ctx.strokeStyle='#16BC5988';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(60,top);ctx.lineTo(60,y);ctx.stroke();ctx.setLineDash([]);
ctx.fillStyle='#9fc4d6';ctx.font='11px system-ui';ctx.fillText(d.toFixed(1)+' m',75,y+4);
document.getElementById('vt').textContent=(+t).toFixed(1);
document.getElementById('msg').innerHTML='En t = '+(+t).toFixed(1)+' s cayó <b>'+d.toFixed(1)+' m</b>. Al <b>duplicar</b> el tiempo, la distancia se <b>cuadruplica</b>: d ∝ t² (no t). Esa es una <b>función</b>: a cada t un único d.';}
const tb=document.getElementById('tb');[0,0.5,1,1.5,2,2.5,3].forEach(t=>{const tr=document.createElement('tr');tr.innerHTML='<td>'+t+'</td><td>'+dist(t).toFixed(1)+'</td>';tb.appendChild(tr);});
T.oninput=()=>draw(+T.value);let raf;document.getElementById('play').onclick=()=>{if(raf){cancelAnimationFrame(raf);raf=null;return;}let t=0;(function s(){t+=0.04;if(t>3)t=3;T.value=t;draw(t);if(t<3)raf=requestAnimationFrame(s);else raf=null;})();};
draw(1);
</script></body></html>
